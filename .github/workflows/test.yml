name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  install-regression:
    name: install regression tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate syntax
        run: |
          node --check setup/install.js
          node --check tests/install-idempotent.test.js

      - name: Run install regression tests
        run: node --test tests/install-idempotent.test.js
